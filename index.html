<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aaryav Arcade</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101216;
      --panel: #191d24;
      --panel-2: #222834;
      --text: #f5f7fb;
      --muted: #a8b0c0;
      --line: #303847;
      --accent: #38bdf8;
      --accent-2: #facc15;
      --danger: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    button,
    input {
      font: inherit;
    }

    .sidebar {
      min-height: 100vh;
      padding: 20px;
      background: #171a21;
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .brand-mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: #06121a;
      font-size: 22px;
      font-weight: 900;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 21px;
      line-height: 1.1;
    }

    .tagline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .search {
      width: 100%;
      height: 38px;
      margin-bottom: 16px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f1218;
      color: var(--text);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
    }

    .library-title {
      margin: 12px 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .game-list {
      display: grid;
      gap: 8px;
    }

    .game-button {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      width: 100%;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .game-button:hover,
    .game-button.active {
      background: var(--panel-2);
      border-color: var(--line);
    }

    .game-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      background: #0d7be8;
      font-size: 22px;
    }

    .game-name {
      display: block;
      margin-top: 2px;
      font-size: 14px;
      font-weight: 700;
    }

    .game-type {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      min-width: 0;
      min-height: 100vh;
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .selected-title {
      font-size: 28px;
      line-height: 1.1;
    }

    .selected-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .action {
      height: 38px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }

    .action.primary {
      border-color: transparent;
      background: var(--accent-2);
      color: #16140a;
      font-weight: 700;
    }

    .stage {
      overflow: hidden;
      height: calc(100vh - 112px);
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #05070b;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .empty {
      display: none;
      height: 100%;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 28px;
    }

    .empty.visible {
      display: grid;
    }

    .empty strong {
      display: block;
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
    }

    @media (max-width: 820px) {
      body {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .game-list {
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }

      main {
        padding: 16px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .stage {
        height: 68vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div>
        <h1>Aaryav Arcade</h1>
        <p class="tagline">Your local gaming platform</p>
      </div>
    </div>

    <input class="search" id="search" type="search" placeholder="Search games">

    <div class="library-title">Game Library</div>
    <div class="game-list" id="gameList"></div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <h2 class="selected-title" id="selectedTitle"></h2>
        <p class="selected-meta" id="selectedMeta"></p>
      </div>
      <div class="actions">
        <button class="action" id="reloadButton" type="button">Reload</button>
        <button class="action primary" id="newTabButton" type="button">Open Full Screen</button>
      </div>
    </div>

    <section class="stage">
      <iframe id="gameFrame" title="Selected game"></iframe>
      <div class="empty" id="emptyState">
        <div>
          <strong>No games found</strong>
          Add another game to the games list or clear the search.
        </div>
      </div>
    </section>
  </main>

  <script>
    const games = [
      {
        id: 'skyline-gauntlet',
        title: 'Skyline Gauntlet',
        genre: '15-level hard platformer',
        icon: 'S',
        path: 'games/skyline-gauntlet/index.html'
      },
      {
        id: 'sports-central',
        title: 'Sports Central',
        genre: 'Team stats and fan alerts',
        icon: 'L',
        path: 'games/sports-central/index.html'
      },
      {
        id: 'maze-monster-survival',
        title: 'Maze Monster Survival',
        genre: '10-level maze chase',
        icon: 'M',
        path: 'games/maze-monster-survival/index.html'
      },
      {
        id: 'pacman',
        title: 'Pacman',
        genre: 'Arcade maze chase',
        icon: 'C',
        path: 'games/pacman/index.html'
      },
      {
        id: 'crossy-chicken',
        title: 'Crossy Chicken',
        genre: 'Road crossing arcade',
        icon: 'X',
        path: 'games/crossy-chicken/index.html'
      },
      {
        id: 'pet-metro-dash',
        title: 'Pet Metro Dash',
        genre: 'Endless pet runner',
        icon: 'P',
        path: 'games/pet-metro-dash/index.html'
      },
      {
        id: 'truck-drive',
        title: 'Truck Drive',
        genre: 'Random driving',
        icon: 'T',
        path: 'games/truck-drive/index.html'
      }
    ];

    const gameList = document.getElementById('gameList');
    const search = document.getElementById('search');
    const gameFrame = document.getElementById('gameFrame');
    const emptyState = document.getElementById('emptyState');
    const selectedTitle = document.getElementById('selectedTitle');
    const selectedMeta = document.getElementById('selectedMeta');
    const reloadButton = document.getElementById('reloadButton');
    const newTabButton = document.getElementById('newTabButton');

    let selectedGame = games[0];

    function renderList() {
      const query = search.value.trim().toLowerCase();
      const filteredGames = games.filter((game) => {
        return `${game.title} ${game.genre}`.toLowerCase().includes(query);
      });

      gameList.innerHTML = '';

      filteredGames.forEach((game) => {
        const button = document.createElement('button');
        button.className = `game-button${game.id === selectedGame.id ? ' active' : ''}`;
        button.type = 'button';
        button.addEventListener('click', () => selectGame(game));

        const icon = document.createElement('span');
        icon.className = 'game-icon';
        icon.textContent = game.icon;

        const text = document.createElement('span');
        const name = document.createElement('span');
        name.className = 'game-name';
        name.textContent = game.title;

        const type = document.createElement('span');
        type.className = 'game-type';
        type.textContent = game.genre;

        text.append(name, type);
        button.append(icon, text);
        gameList.append(button);
      });

      const hasGames = filteredGames.length > 0;
      emptyState.classList.toggle('visible', !hasGames);
      gameFrame.style.display = hasGames ? 'block' : 'none';
    }

    function selectGame(game) {
      selectedGame = game;
      selectedTitle.textContent = game.title;
      selectedMeta.textContent = game.genre;
      gameFrame.src = game.path;
      renderList();
    }

    reloadButton.addEventListener('click', () => {
      if (selectedGame) {
        gameFrame.src = selectedGame.path;
      }
    });

    newTabButton.addEventListener('click', () => {
      if (selectedGame) {
        window.open(selectedGame.path, '_blank');
      }
    });

    search.addEventListener('input', renderList);

    selectGame(selectedGame);
  </script>
</body>
</html>
