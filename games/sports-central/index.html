<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sports Central</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #91cce4;
      --bg-2: #b9e0ef;
      --card: #d6edf6;
      --card-2: #c7e5f1;
      --text: #1f2933;
      --muted: #556270;
      --line: rgba(255, 255, 255, 0.72);
      --shadow: rgba(50, 83, 104, 0.16);
      --blue: #63c5ee;
      --green: #84ddc8;
      --orange: #f7bd76;
      --red: #f5a4a4;
      --purple: #b8acf2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.42) 0 3px, transparent 4px),
        radial-gradient(circle at 31% 60%, rgba(255, 255, 255, 0.44) 0 3px, transparent 4px),
        radial-gradient(circle at 64% 35%, rgba(255, 255, 255, 0.38) 0 3px, transparent 4px),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      background-size: 260px 260px, 310px 310px, 360px 360px, auto;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1480px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(18px, 3vw, 34px);
      display: grid;
      gap: 24px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      min-height: 78px;
    }

    .title-wrap {
      display: grid;
      gap: 7px;
    }

    .kicker {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(34px, 7vw, 74px);
      line-height: 0.9;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(28px, 5vw, 48px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    h3 {
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 700;
      line-height: 1.25;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .search {
      width: min(360px, 100%);
      height: 46px;
      padding: 0 16px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(229, 245, 251, 0.88);
      color: var(--text);
      font-weight: 700;
      outline: none;
      box-shadow: 0 10px 28px var(--shadow);
    }

    .search:focus {
      border-color: var(--blue);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: clamp(16px, 2.4vw, 28px);
      align-items: stretch;
    }

    .card {
      min-height: 238px;
      padding: clamp(22px, 3vw, 34px);
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(214, 237, 246, 0.84);
      color: var(--text);
      text-align: left;
      box-shadow: 0 22px 55px var(--shadow);
      display: grid;
      align-content: space-between;
      gap: 18px;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      background: rgba(226, 246, 253, 0.96);
      border-color: rgba(255, 255, 255, 0.96);
    }

    .emoji {
      display: block;
      font-size: 44px;
      line-height: 1;
    }

    .card-title {
      display: block;
      font-size: clamp(24px, 3.2vw, 34px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .card-copy {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      font-size: clamp(16px, 2.1vw, 22px);
      font-weight: 700;
      line-height: 1.25;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 34px;
    }

    .chip {
      min-height: 34px;
      padding: 5px 16px;
      border: 2px solid var(--chip-color);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      color: #27313c;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .plain-button,
    .primary-button {
      min-height: 44px;
      padding: 0 16px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(214, 237, 246, 0.88);
      color: var(--text);
      font-weight: 900;
      box-shadow: 0 10px 28px var(--shadow);
    }

    .primary-button {
      border-color: #7ac9e9;
      background: #9bdcf3;
    }

    .detail {
      display: grid;
      grid-template-columns: minmax(260px, 390px) 1fr;
      gap: clamp(16px, 2.4vw, 28px);
      align-items: start;
    }

    .team-hero,
    .stats-panel {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(214, 237, 246, 0.86);
      box-shadow: 0 22px 55px var(--shadow);
    }

    .team-hero {
      min-height: 380px;
      padding: clamp(24px, 3vw, 34px);
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .badge {
      display: grid;
      width: 110px;
      height: 110px;
      place-items: center;
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--team-a), var(--team-b));
      color: white;
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.32);
    }

    .stats-panel {
      padding: clamp(20px, 2.5vw, 28px);
      display: grid;
      gap: 18px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
    }

    .stat,
    .matchup,
    .meter-box {
      min-height: 86px;
      padding: 16px;
      border: 2px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      background: rgba(232, 247, 252, 0.72);
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .meter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .bar {
      overflow: hidden;
      height: 14px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(85, 98, 112, 0.18);
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--team-a), var(--team-b));
    }

    .matchup {
      display: grid;
      gap: 8px;
    }

    .follow-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .follow-item {
      min-height: 70px;
      padding: 13px;
      border: 2px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      background: rgba(232, 247, 252, 0.72);
      display: grid;
      gap: 4px;
    }

    .follow-actions,
    .preference-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .preference-list {
      display: grid;
      gap: 8px;
    }

    .preference-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .preference-row input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .loading-card {
      min-height: 0;
      padding: 18px;
      align-content: center;
    }

    .analytics-layout {
      display: grid;
      gap: 18px;
    }

    .analytics-section {
      display: grid;
      gap: 12px;
    }

    .analytics-list {
      display: grid;
      gap: 8px;
    }

    .analytics-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border: 2px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      background: rgba(232, 247, 252, 0.72);
      color: var(--muted);
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(65, 113, 139, 0.52);
      z-index: 10;
    }

    .modal-backdrop.visible {
      display: grid;
    }

    .modal {
      width: min(480px, 100%);
      padding: 24px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #d9f0f8;
      box-shadow: 0 22px 55px rgba(50, 83, 104, 0.28);
      display: grid;
      gap: 16px;
    }

    .modal input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--text);
      font-weight: 800;
      outline: none;
    }

    .modal .preference-row input {
      width: 18px;
      height: 18px;
      padding: 0;
    }

    .modal input:focus {
      border-color: var(--blue);
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 13px 15px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #d9f0f8;
      color: var(--text);
      font-weight: 800;
      box-shadow: 0 18px 44px rgba(50, 83, 104, 0.24);
      transform: translateY(130%);
      transition: transform 160ms ease;
      z-index: 12;
    }

    .toast.visible {
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .search {
        width: 100%;
      }

      .detail {
        grid-template-columns: 1fr;
      }

      .stat-grid,
      .meter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .app {
        padding: 14px;
      }

      .grid,
      .stat-grid,
      .meter-grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 210px;
      }

      .team-hero {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-wrap">
        <div class="kicker" id="kicker">League folders</div>
        <h1 id="pageTitle">Sports Central</h1>
        <p class="sub" id="pageSubtitle">Pick a league to open every team.</p>
      </div>
      <div class="toolbar">
        <button class="plain-button hidden" id="backButton" type="button">Back</button>
        <input class="search" id="globalSearch" type="search" placeholder="Search all teams">
        <input class="search hidden" id="search" type="search" placeholder="Search teams">
        <button class="plain-button" id="myTeamsButton" type="button">My Teams</button>
        <button class="plain-button" id="analyticsButton" type="button">Analytics</button>
        <button class="plain-button" id="runRecapsButton" type="button">Recap Now</button>
      </div>
    </header>

    <main id="content"></main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <form class="modal" id="followForm">
      <div class="title-wrap">
        <div class="kicker">Game alerts</div>
        <h3 id="modalTitle">Follow team</h3>
        <p class="sub" id="modalCopy">Enter your email for game reminders and final score updates.</p>
      </div>
      <input id="emailInput" type="email" autocomplete="email" placeholder="your@email.com" required>
      <div class="preference-list">
        <label class="preference-row">
          <input id="prefFinal" type="checkbox" checked>
          Final score emails after a followed team finishes a game
        </label>
        <label class="preference-row">
          <input id="prefReminder" type="checkbox">
          Pre-game reminder emails if that feature is added later
        </label>
        <label class="preference-row">
          <input id="prefTest" type="checkbox" checked>
          Allow test emails from this app
        </label>
      </div>
      <div class="modal-actions">
        <button class="plain-button" id="cancelFollow" type="button">Cancel</button>
        <button class="primary-button" type="submit">Follow</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

    function hashText(text) {
      let hash = 0;
      for (let index = 0; index < text.length; index += 1) {
        hash = (hash * 31 + text.charCodeAt(index)) >>> 0;
      }
      return hash;
    }

    function loadSubscriptions() {
      try {
        return JSON.parse(localStorage.getItem('sports-central-follows')) || [];
      } catch (error) {
        return [];
      }
    }

    function saveSubscriptions() {
      localStorage.setItem('sports-central-follows', JSON.stringify(subscriptions));
    }

    function getOrCreateId(key) {
      let value = localStorage.getItem(key);
      if (!value) {
        value = window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        localStorage.setItem(key, value);
      }
      return value;
    }

    function getOrCreateSessionId() {
      let value = sessionStorage.getItem('sports-central-session-id');
      if (!value) {
        value = window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        sessionStorage.setItem('sports-central-session-id', value);
      }
      return value;
    }

    function trackEvent(eventType, details = {}) {
      if (localStorage.getItem('sports-central-owner-mode') === 'true') {
        return;
      }

      fetch('/api/track-event', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          eventType,
          visitorId,
          sessionId,
          page: location.pathname,
          referrer: document.referrer,
          ...details
        })
      }).catch(() => {});
    }

        backdrop.innerHTML = `
          <form class="modal">
            <div class="title-wrap">
              <div class="kicker">Private access</div>
              <h3>${title}</h3>
              <p class="sub">Enter your CRON_SECRET. It will be hidden while you type.</p>
            </div>
            <input type="password" autocomplete="current-password" placeholder="CRON_SECRET" required>
            <div class="modal-actions">
              <button class="plain-button cancel-secret" type="button">Cancel</button>
              <button class="primary-button" type="submit">Continue</button>
            </div>
          </form>
        `;
        const form = backdrop.querySelector('form');
        const input = backdrop.querySelector('input');

        function close(value = '') {
          backdrop.remove();
          resolve(value);
        }

        form.addEventListener('submit', (event) => {
          event.preventDefault();
          close(input.value.trim());
        });
        backdrop.querySelector('.cancel-secret').addEventListener('click', () => close(''));
        backdrop.addEventListener('click', (event) => {
          if (event.target === backdrop) {
            close('');
          }
        });

        document.body.append(backdrop);
        input.focus();
      });
    }

    function defaultPreferences() {
      return {
        finalScore: true,
        reminders: false,
        testEmails: true
      };
    }

    function normalizePreferences(preferences = {}) {
      return {
        finalScore: preferences.finalScore !== false && preferences.final_score_emails !== false,
        reminders: Boolean(preferences.reminders || preferences.reminder_emails),
        testEmails: preferences.testEmails !== false && preferences.test_emails !== false
      };
    }

    function setCurrentEmail(email) {
      currentEmail = email;
      localStorage.setItem('sports-central-email', email);
    }

    function allTeamEntries() {
      return leagues.flatMap((league) => league.teams.map((team) => ({ league, team })));
    }

    function upsertLocalFollow({ email, league, leagueName, team, preferences }) {
      const existing = subscriptions.find((item) => item.email === email && item.league === league && item.team === team);
      const nextPreferences = normalizePreferences(preferences);
      if (existing) {
        existing.email = email;
        existing.leagueName = leagueName;
        existing.preferences = nextPreferences;
        return existing;
      }

      const follow = {
        league,
        leagueName,
        team,
        email,
        preferences: nextPreferences,
        createdAt: new Date().toISOString()
      };
      subscriptions.push(follow);
      return follow;
    }

    function removeLocalFollow(email, leagueId, teamName) {
      const index = subscriptions.findIndex((item) => item.email === email && item.league === leagueId && item.team === teamName);
      if (index !== -1) {
        subscriptions.splice(index, 1);
        saveSubscriptions();
      }
    }

    function subscriptionFor(league, teamName) {
      return subscriptions.find((item) => item.league === league.id && item.team === teamName && (!currentEmail || item.email === currentEmail))
        || subscriptions.find((item) => item.league === league.id && item.team === teamName);
    }

    function teamInitials(name) {
      return name
        .replace(/FC|SC|CF|LA|D\.C\./g, '')
        .split(/\s+/)
        .filter(Boolean)
        .slice(-2)
        .map((word) => word[0])
        .join('')
        .toUpperCase();
    }

    function teamColors(teamName) {
      const palette = [
        ['#4f8fd9', '#f28f6b'],
        ['#18a999', '#f2c94c'],
        ['#7868e6', '#64c7a8'],
        ['#da5e5e', '#2f3a4a'],
        ['#2b9ec5', '#f0a64d'],
        ['#6272d9', '#e1b64f']
      ];
      return palette[hashText(teamName) % palette.length];
    }

    function dateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function compactDate(date) {
      return dateString(date).replace(/-/g, '');
    }

    function formatGameDate(value) {
      if (!value) {
        return 'time TBA';
      }
      return new Intl.DateTimeFormat(undefined, {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      }).format(new Date(value));
    }

    function getMlbLive(teamName) {
      return liveMlbData[teamName] || null;
    }

    function normalizeName(name) {
      return String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function getLeagueLive(leagueId, teamName) {
      return liveLeagueData[leagueId]?.[teamName] || null;
    }

    function ratingBounds(sport) {
      if (sport === 'Football') return { offenseMax: 38, defenseMax: 35 };
      if (sport === 'Basketball') return { offenseMax: 130, defenseMax: 125 };
      if (sport === 'Baseball') return { offenseMax: 8, defenseMax: 7 };
      if (sport === 'Hockey') return { offenseMax: 5, defenseMax: 5 };
      if (sport === 'Soccer') return { offenseMax: 4, defenseMax: 4 };
      return { offenseMax: 100, defenseMax: 100 };
    }

    function clampRating(value) {
      return Math.max(30, Math.min(99, Math.round(value)));
    }

    function calculateRecentRatings(league, recentGames) {
      if (!recentGames.length) {
        return null;
      }

      const { offenseMax, defenseMax } = ratingBounds(league.sport);
      const totals = recentGames.reduce((sum, game) => {
        sum.scored += game.scored;
        sum.allowed += game.allowed;
        sum.wins += game.scored > game.allowed ? 1 : 0;
        sum.draws += game.scored === game.allowed ? 1 : 0;
        return sum;
      }, { scored: 0, allowed: 0, wins: 0, draws: 0 });
      const averageScored = totals.scored / recentGames.length;
      const averageAllowed = totals.allowed / recentGames.length;
      const resultRate = (totals.wins + totals.draws * 0.5) / recentGames.length;
      const newestFirst = [...recentGames].sort((a, b) => new Date(b.date) - new Date(a.date));
      let streak = 0;
      let streakType = '';

      newestFirst.some((game) => {
        const result = game.scored > game.allowed ? 'W' : game.scored < game.allowed ? 'L' : 'T';
        if (!streakType) {
          streakType = result;
        }
        if (result === streakType) {
          streak += 1;
          return false;
        }
        return true;
      });

      return {
        offense: clampRating(45 + (averageScored / offenseMax) * 54),
        defense: clampRating(99 - (averageAllowed / defenseMax) * 54),
        momentum: clampRating(35 + resultRate * 55 + Math.min(streak, 5) * (streakType === 'W' ? 3 : streakType === 'L' ? -2 : 1)),
        streak: streakType ? `${streakType}${streak}` : '',
        sourceDetail: `Ratings from last ${recentGames.length} completed games`
      };
    }

    async function refreshLeagueData(league, force = false) {
      const config = espnLeagueConfigs[league.id];
      if (!config || leagueLoading[league.id]) {
        return;
      }
      if (!force && leagueLastUpdated[league.id] && Date.now() - leagueLastUpdated[league.id] < 30000) {
        return;
      }

      leagueLoading[league.id] = true;
      try {
        const [sport, slug] = config;
        const scoreboardUrl = `https://site.api.espn.com/apis/site/v2/sports/${sport}/${slug}/scoreboard?limit=500`;
        const scoreboardResponse = await fetch(scoreboardUrl);
        if (!scoreboardResponse.ok) {
          throw new Error(`${league.name} scoreboard request failed`);
        }
        const scoreboard = await scoreboardResponse.json();
        liveLeagueData[league.id] ||= {};

        (scoreboard.events || []).forEach((event) => {
          const competition = event.competitions?.[0];
          const competitors = competition?.competitors || [];
          competitors.forEach((competitor) => {
            const teamName = league.teams.find((name) => normalizeName(name) === normalizeName(competitor.team?.displayName));
            const opponent = competitors.find((candidate) => candidate !== competitor);
            if (!teamName || !opponent) {
              return;
            }

            const home = competitor.homeAway === 'home';
            const overall = competitor.records?.find((record) => record.type === 'total' || record.name === 'overall');
            const status = event.status?.type || competition.status?.type || {};
            liveLeagueData[league.id][teamName] = {
              record: overall?.summary || '',
              winPct: '',
              rank: '',
              streak: status.completed ? 'Final' : 'Next',
              nextGame: `${home ? 'vs' : 'at'} ${opponent.team.displayName}`,
              nextGameTime: formatGameDate(event.date),
              broadcast: competition.venue?.fullName || 'ESPN scoreboard',
              alertTime: status.completed ? 'final score' : '30 minutes before',
              source: `Live ${league.name} scoreboard`,
              status: status.shortDetail || status.detail || status.description || ''
            };
          });
        });

        const recentByTeam = {};
        const recentDates = Array.from({ length: 18 }, (_, index) => {
          const date = new Date();
          date.setDate(date.getDate() - index);
          return date;
        });

        await Promise.all(recentDates.map(async (date) => {
          const recentUrl = `https://site.api.espn.com/apis/site/v2/sports/${sport}/${slug}/scoreboard?dates=${compactDate(date)}&limit=500`;
          const recentResponse = await fetch(recentUrl);
          if (!recentResponse.ok) {
            return;
          }
          const recentScoreboard = await recentResponse.json();
          (recentScoreboard.events || []).forEach((event) => {
            const competition = event.competitions?.[0];
            const competitors = competition?.competitors || [];
            const completed = event.status?.type?.completed || competition?.status?.type?.completed;
            if (!completed || competitors.length < 2) {
              return;
            }
            competitors.forEach((competitor) => {
              const teamName = league.teams.find((name) => normalizeName(name) === normalizeName(competitor.team?.displayName));
              const opponent = competitors.find((candidate) => candidate !== competitor);
              if (!teamName || !opponent || competitor.score == null || opponent.score == null) {
                return;
              }
              recentByTeam[teamName] ||= [];
              recentByTeam[teamName].push({
                date: event.date,
                scored: Number(competitor.score),
                allowed: Number(opponent.score)
              });
            });
          });
        }));

        Object.entries(recentByTeam).forEach(([teamName, games]) => {
          const ratings = calculateRecentRatings(
            league,
            games.sort((a, b) => new Date(a.date) - new Date(b.date)).slice(-10)
          );
          if (!ratings) {
            return;
          }
          liveLeagueData[league.id][teamName] ||= {
            record: '',
            winPct: '',
            rank: '',
            nextGame: 'No upcoming game found',
            nextGameTime: '',
            broadcast: 'ESPN scoreboard',
            alertTime: 'final score',
            source: `Live ${league.name} scoreboard`,
            status: ''
          };
          Object.assign(liveLeagueData[league.id][teamName], ratings);
        });

        leagueLastUpdated[league.id] = Date.now();
        if (activeLeague?.id === league.id) {
          if (view === 'teams') {
            renderTeams(activeLeague, false);
          }
          if (view === 'detail' && activeTeam) {
            renderDetail(activeLeague, activeTeam, false);
          }
        }
      } catch (error) {
        showToast(`${league.name} live data could not update. Showing fallback stats.`);
      } finally {
        leagueLoading[league.id] = false;
      }
    }

    async function refreshMlbData(force = false) {
      const mlb = leagues.find((league) => league.id === 'mlb');
      if (!mlb || mlbLoading) {
        return;
      }
      if (!force && mlbLastUpdated && Date.now() - mlbLastUpdated < 25000) {
        return;
      }

      mlbLoading = true;
      try {
        const standingsUrl = 'https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=2026&standingsTypes=regularSeason';
        const standingsResponse = await fetch(standingsUrl);
        if (!standingsResponse.ok) {
          throw new Error('MLB standings request failed');
        }
        const standings = await standingsResponse.json();
        const liveById = {};

        standings.records.forEach((division) => {
          division.teamRecords.forEach((record) => {
            liveById[record.team.id] = {
              record: `${record.wins}-${record.losses}`,
              wins: record.wins,
              losses: record.losses,
              winPct: record.winningPercentage || '.000',
              rank: Number(record.leagueRank) || Number(record.divisionRank) || 0,
              streak: record.streak?.streakCode || 'N/A',
              divisionRank: record.divisionRank || 'N/A'
            };
          });
        });

        const today = new Date();
        const end = new Date(today);
        end.setDate(today.getDate() + 45);
        const scheduleUrl = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&season=2026&gameType=R&startDate=${dateString(today)}&endDate=${dateString(end)}&hydrate=team,gameInfo`;
        const scheduleResponse = await fetch(scheduleUrl);
        if (!scheduleResponse.ok) {
          throw new Error('MLB schedule request failed');
        }
        const schedule = await scheduleResponse.json();
        const nextGames = {};

        schedule.dates.forEach((date) => {
          date.games.forEach((game) => {
            const awayId = game.teams.away.team.id;
            const homeId = game.teams.home.team.id;
            [awayId, homeId].forEach((teamId) => {
              if (!nextGames[teamId]) {
                const home = teamId === homeId;
                const opponent = home ? game.teams.away.team.name : game.teams.home.team.name;
                nextGames[teamId] = {
                  label: `${home ? 'vs' : 'at'} ${opponent}`,
                  date: game.gameDate,
                  status: game.status?.detailedState || 'Scheduled',
                  venue: game.venue?.name || ''
                };
              }
            });
          });
        });

        Object.entries(mlbTeamIds).forEach(([teamName, teamId]) => {
          const record = liveById[teamId];
          if (!record) {
            return;
          }
          const next = nextGames[teamId];
          liveMlbData[teamName] = {
            ...record,
            nextGame: next ? next.label : 'No upcoming regular-season game',
            nextGameTime: next ? formatGameDate(next.date) : '',
            broadcast: next?.venue || 'MLB regular season',
            alertTime: '30 minutes before',
            status: next?.status || 'Schedule unavailable',
            source: 'Live MLB regular season'
          };
        });

        const recentStart = new Date(today);
        recentStart.setDate(today.getDate() - 30);
        const recentUrl = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&season=2026&gameType=R&startDate=${dateString(recentStart)}&endDate=${dateString(today)}&hydrate=team,linescore`;
        const recentResponse = await fetch(recentUrl);
        if (recentResponse.ok) {
          const recentSchedule = await recentResponse.json();
          Object.entries(mlbTeamIds).forEach(([teamName, teamId]) => {
            const recentGames = [];
            (recentSchedule.dates || []).forEach((date) => {
              (date.games || []).forEach((game) => {
                const status = game.status?.detailedState || '';
                const finished = status === 'Final' || status === 'Game Over' || status.includes('Completed');
                const away = game.teams.away;
                const home = game.teams.home;
                const involved = away.team.id === teamId || home.team.id === teamId;
                if (!finished || !involved || away.score == null || home.score == null) {
                  return;
                }
                const team = away.team.id === teamId ? away : home;
                const opponent = away.team.id === teamId ? home : away;
                recentGames.push({
                  date: game.gameDate,
                  scored: Number(team.score),
                  allowed: Number(opponent.score)
                });
              });
            });
            const ratings = calculateRecentRatings(mlb, recentGames.slice(-10));
            if (ratings && liveMlbData[teamName]) {
              Object.assign(liveMlbData[teamName], ratings);
            }
          });
        }

        mlbLastUpdated = Date.now();
        if (activeLeague?.id === 'mlb') {
          if (view === 'teams') {
            renderTeams(activeLeague, false);
          }
          if (view === 'detail' && activeTeam) {
            renderDetail(activeLeague, activeTeam, false);
          }
        }
      } catch (error) {
        showToast('MLB live data could not update. Showing saved fallback stats.');
      } finally {
        mlbLoading = false;
      }
    }

    function startLiveRefresh() {
      clearInterval(liveRefreshTimer);
      liveRefreshTimer = setInterval(() => {
        if (activeLeague?.id === 'mlb') {
          refreshMlbData(true);
        } else if (espnLeagueConfigs[activeLeague?.id]) {
          refreshLeagueData(activeLeague, true);
        }
      }, 30000);
    }

    function buildStats(league, teamName) {
      const live = league.id === 'mlb' ? getMlbLive(teamName) : getLeagueLive(league.id, teamName);
      const seed = hashText(`${league.id}-${teamName}`);
      const games = league.sport === 'Baseball' ? 162 : league.sport === 'Football' ? 17 : league.sport === 'Soccer' ? 34 : 82;
      const draws = league.sport === 'Soccer' ? seed % 8 : 0;
      const wins = Math.max(1, Math.min(games - draws - 1, Math.floor(games * (0.34 + (seed % 36) / 100))));
      const losses = Math.max(0, games - wins - draws);
      const offense = 70 + (seed % 29);
      const defense = 66 + ((seed >> 5) % 31);
      const momentum = 41 + ((seed >> 11) % 57);
      const opponents = league.teams.filter((team) => team !== teamName);
      const opponent = opponents[(seed >> 7) % opponents.length] || 'TBA';
      return {
        record: live?.record || (league.sport === 'Soccer' ? `${wins}-${losses}-${draws}` : `${wins}-${losses}`),
        winPct: live?.winPct || (wins / games).toFixed(3).replace(/^0/, ''),
        rank: live?.rank || 1 + (seed % league.teams.length),
        streak: live?.streak || `${seed % 3 === 1 ? 'L' : 'W'}${1 + (seed % 5)}`,
        offense: live?.offense || offense,
        defense: live?.defense || defense,
        momentum: live?.momentum || momentum,
        nextGame: live?.nextGame || `vs ${opponent}`,
        nextGameTime: live?.nextGameTime || '',
        broadcast: live?.broadcast || ['Local TV', 'National Stream', 'Prime Time', 'Radio + App'][seed % 4],
        alertTime: live?.alertTime || ['2 hours before', '30 minutes before', 'at game start', 'final score'][seed % 4],
        form: live?.form || ['Hot', 'Steady', 'Clutch', 'Building', 'Dangerous'][seed % 5],
        source: live?.source || 'Projected demo stats',
        status: live?.status || '',
        sourceDetail: live?.sourceDetail || 'Fallback demo rating formula'
      };
    }

    function isFollowing(league, teamName) {
      return Boolean(subscriptionFor(league, teamName));
    }

    function setHeader(nextKicker, title, subtitle) {
      kicker.textContent = nextKicker;
      pageTitle.textContent = title;
      pageSubtitle.textContent = subtitle;
      backButton.classList.toggle('hidden', view === 'leagues');
      search.classList.toggle('hidden', view !== 'teams');
      myTeamsButton.textContent = currentEmail ? 'My Teams' : 'My Teams';
      if (view !== 'teams') {
        search.value = '';
      }
    }

    function makeChip(text, color) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.style.setProperty('--chip-color', color);
      chip.textContent = text;
      return chip;
    }

    function renderLeagues() {
      view = 'leagues';
      activeLeague = null;
      activeTeam = null;
      setHeader('League folders', 'Sports Central', 'Pick a league to open every team.');
      content.innerHTML = '';

      const grid = document.createElement('section');
      grid.className = 'grid';

      const lastLeagueId = localStorage.getItem('sports-central-last-league');
      const lastLeague = leagues.find((league) => league.id === lastLeagueId);
      if (lastLeague) {
        const shortcut = document.createElement('button');
        shortcut.type = 'button';
        shortcut.className = 'card loading-card';
        shortcut.addEventListener('click', () => renderTeams(lastLeague));
        shortcut.innerHTML = `
          <div>
            <span class="emoji">${lastLeague.emoji}</span>
            <span class="card-title">Last Opened: ${lastLeague.name}</span>
            <span class="card-copy">Jump back into ${lastLeague.fullName}.</span>
          </div>
          <div class="chips"><span class="chip" style="--chip-color:${lastLeague.color}">shortcut</span></div>
        `;
        grid.append(shortcut);
      }

      leagues.forEach((league) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.addEventListener('click', () => renderTeams(league));

        const top = document.createElement('div');
        const emoji = document.createElement('span');
        emoji.className = 'emoji';
        emoji.textContent = league.emoji;
        const title = document.createElement('span');
        title.className = 'card-title';
        title.textContent = league.name;
        const copy = document.createElement('span');
        copy.className = 'card-copy';
        copy.textContent = league.copy;
        top.append(emoji, title, copy);

        const chips = document.createElement('div');
        chips.className = 'chips';
        league.tags.forEach((tag) => chips.append(makeChip(tag, league.color)));
        card.append(top, chips);
        grid.append(card);
      });

      content.append(grid);
    }

    function renderTeams(league = activeLeague, requestLiveUpdate = true) {
      view = 'teams';
      activeLeague = league;
      activeTeam = null;
      localStorage.setItem('sports-central-last-league', league.id);
      if (requestLiveUpdate) {
        trackEvent('league_open', {
          league: league.id
        });
      }
      const query = search.value.trim().toLowerCase();
      const teams = league.teams.filter((team) => team.toLowerCase().includes(query));
      const liveNote = league.id === 'mlb'
        ? ` Live regular-season data refreshes every 30 seconds${mlbLastUpdated ? `; last update ${new Date(mlbLastUpdated).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}.` : '.'}`
        : espnLeagueConfigs[league.id]
          ? ` Live scoreboard data refreshes every 30 seconds${leagueLastUpdated[league.id] ? `; last update ${new Date(leagueLastUpdated[league.id]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}.` : '.'}`
        : '';
      setHeader('Team folder', league.fullName, `${teams.length} of ${league.teams.length} teams shown. Click a card for stats and follow alerts.${liveNote}`);
      content.innerHTML = '';

      if (league.id === 'mlb' && requestLiveUpdate) {
        refreshMlbData(true);
      } else if (espnLeagueConfigs[league.id] && requestLiveUpdate) {
        refreshLeagueData(league, true);
      }

      if ((league.id === 'mlb' && mlbLoading && !mlbLastUpdated) || (espnLeagueConfigs[league.id] && leagueLoading[league.id] && !leagueLastUpdated[league.id])) {
        const loading = document.createElement('div');
        loading.className = 'card loading-card';
        loading.innerHTML = '<span class="card-title">Loading live scoreboard</span><span class="card-copy">Cards will fill in with current records and game status when the source responds.</span>';
        content.append(loading);
      }

      const grid = document.createElement('section');
      grid.className = 'grid';

      teams.forEach((teamName) => {
        const stats = buildStats(league, teamName);
        const colors = teamColors(teamName);
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.addEventListener('click', () => renderDetail(league, teamName));

        const top = document.createElement('div');
        const badge = document.createElement('span');
        badge.className = 'emoji';
        badge.textContent = teamInitials(teamName);
        badge.style.color = colors[0];
        const title = document.createElement('span');
        title.className = 'card-title';
        title.textContent = teamName;
        const copy = document.createElement('span');
        copy.className = 'card-copy';
        copy.textContent = `${stats.record} season | ${stats.streak} streak | ${stats.nextGame}${stats.nextGameTime ? `, ${stats.nextGameTime}` : ''}`;
        top.append(badge, title, copy);

        const chips = document.createElement('div');
        chips.className = 'chips';
        chips.append(makeChip(`#${stats.rank}`, league.color));
        chips.append(makeChip(isFollowing(league, teamName) ? 'following' : 'stats', colors[1]));
        card.append(top, chips);
        grid.append(card);
      });

      if (teams.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'sub';
        empty.textContent = 'No teams matched that search.';
        content.append(empty);
        return;
      }

      content.append(grid);
    }

    function renderDetail(league, teamName, requestLiveUpdate = true) {
      view = 'detail';
      activeLeague = league;
      activeTeam = teamName;
      if (requestLiveUpdate) {
        trackEvent('team_open', {
          league: league.id,
          team: teamName
        });
      }
      const stats = buildStats(league, teamName);
      const colors = teamColors(teamName);
      const followed = isFollowing(league, teamName);
      const lastUpdated = league.id === 'mlb'
        ? mlbLastUpdated
        : leagueLastUpdated[league.id];
      const liveNote = league.id === 'mlb'
        ? ` | ${stats.source}${mlbLastUpdated ? ` updated ${new Date(mlbLastUpdated).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}` : ' loading'}`
        : espnLeagueConfigs[league.id]
          ? ` | ${stats.source}${leagueLastUpdated[league.id] ? ` updated ${new Date(leagueLastUpdated[league.id]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}` : ' loading'}`
        : '';
      setHeader('Team stats', teamName, `${league.name} | ${stats.nextGame}${stats.nextGameTime ? `, ${stats.nextGameTime}` : ''} | ${stats.broadcast}${liveNote}`);
      content.innerHTML = '';

      if (league.id === 'mlb' && requestLiveUpdate) {
        refreshMlbData(true);
      } else if (espnLeagueConfigs[league.id] && requestLiveUpdate) {
        refreshLeagueData(league, true);
      }

      const detail = document.createElement('section');
      detail.className = 'detail';
      detail.style.setProperty('--team-a', colors[0]);
      detail.style.setProperty('--team-b', colors[1]);

      const hero = document.createElement('div');
      hero.className = 'team-hero';
      hero.innerHTML = `
        <div>
          <div class="badge">${teamInitials(teamName)}</div>
          <h2 style="margin-top:18px">${teamName}</h2>
          <p class="sub">${league.fullName}</p>
        </div>
        <div class="chips">
          <span class="chip" style="--chip-color:${league.color}">${league.sport}</span>
          <span class="chip" style="--chip-color:${colors[1]}">${followed ? 'following' : 'not followed'}</span>
        </div>
        <div class="toolbar" style="justify-content:flex-start">
          <button class="primary-button" id="followButton" type="button">${followed ? 'Update Email' : 'Follow'}</button>
          <button class="plain-button ${followed ? '' : 'hidden'}" id="unfollowButton" type="button">Unfollow</button>
          <button class="plain-button" id="testEmailButton" type="button">Test Email</button>
        </div>
      `;

      const panel = document.createElement('div');
      panel.className = 'stats-panel';
      panel.innerHTML = `
        <div class="stat-grid">
          <div class="stat"><div class="label">Season Record</div><div class="value">${stats.record}</div></div>
          <div class="stat"><div class="label">Win Pct</div><div class="value">${stats.winPct}</div></div>
          <div class="stat"><div class="label">${league.id === 'mlb' ? 'League Rank' : 'Power Rank'}</div><div class="value">${stats.rank ? `#${stats.rank}` : 'Live'}</div></div>
          <div class="stat"><div class="label">Streak</div><div class="value">${stats.streak}</div></div>
        </div>
        <div class="meter-grid">
          <div class="meter-box"><div class="label">Offense</div><div class="bar"><span style="width:${stats.offense}%"></span></div><div class="value">${stats.offense}</div></div>
          <div class="meter-box"><div class="label">Defense</div><div class="bar"><span style="width:${stats.defense}%"></span></div><div class="value">${stats.defense}</div></div>
          <div class="meter-box"><div class="label">Momentum</div><div class="bar"><span style="width:${stats.momentum}%"></span></div><div class="value">${stats.momentum}</div></div>
        </div>
        <div class="matchup">
          <h3>Game Status</h3>
          <p class="sub">${stats.status || stats.nextGameTime || 'Schedule status unavailable'}</p>
          <p class="sub">${lastUpdated ? `Last updated ${new Date(lastUpdated).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}` : 'Live source is loading or unavailable.'}</p>
          <div class="chips">
            <span class="chip" style="--chip-color:${league.color}">${stats.source}</span>
            <span class="chip" style="--chip-color:${colors[1]}">${stats.nextGameTime ? 'scheduled' : 'check source'}</span>
          </div>
        </div>
        <div class="matchup">
          <h3>Rating Source</h3>
          <p class="sub">${stats.sourceDetail}. Offense estimates recent scoring strength, defense estimates recent stopping strength, and momentum weighs recent results and streak.</p>
          <p class="sub">Records and matchups use the live source shown on this page when available.</p>
        </div>
        <div class="matchup">
          <h3>Next Game</h3>
          <p class="sub">${stats.nextGame}</p>
          <p class="sub">${stats.nextGameTime ? `${stats.nextGameTime} | ` : ''}${stats.broadcast} | Alert ${stats.alertTime}</p>
          <p class="sub">${stats.source}${stats.status ? ` | ${stats.status}` : ''}</p>
        </div>
        <div class="matchup">
          <h3>Followed Teams</h3>
          <div class="follow-list" id="followList"></div>
          <p class="sub">Follows are saved to the server for automatic final-score emails. On the free Vercel plan, the checker runs once per day.</p>
        </div>
      `;

      detail.append(hero, panel);
      content.append(detail);
      document.getElementById('followButton').addEventListener('click', () => openFollow(league, teamName));
      document.getElementById('unfollowButton')?.addEventListener('click', () => unfollowTeam(league, teamName));
      document.getElementById('testEmailButton').addEventListener('click', () => testEmail(league, teamName));
      renderFollowList();
    }

    function renderFollowList() {
      const list = document.getElementById('followList');
      if (!list) {
        return;
      }
      list.innerHTML = '';
      if (subscriptions.length === 0) {
        const item = document.createElement('div');
        item.className = 'follow-item';
        item.innerHTML = '<strong>No follows yet</strong><span class="sub">Use Follow to save one.</span>';
        list.append(item);
        return;
      }

      subscriptions.slice(-6).reverse().forEach((subscription) => {
        const item = document.createElement('div');
        item.className = 'follow-item';
        item.innerHTML = `
          <strong>${subscription.team}</strong>
          <span>${subscription.leagueName} | ${subscription.email}</span>
          <span>Final scores ${normalizePreferences(subscription.preferences).finalScore ? 'on' : 'off'}</span>
        `;
        list.append(item);
      });
    }

    function openFollow(league, teamName) {
      pendingFollowTeam = { league, teamName };
      const existing = subscriptionFor(league, teamName);
      const preferences = existing ? normalizePreferences(existing.preferences) : defaultPreferences();
      modalTitle.textContent = `Follow ${teamName}`;
      modalCopy.textContent = 'Enter your email and choose which alerts you want.';
      emailInput.value = existing ? existing.email : currentEmail;
      prefFinal.checked = preferences.finalScore;
      prefReminder.checked = preferences.reminders;
      prefTest.checked = preferences.testEmails;
      modalBackdrop.classList.add('visible');
      emailInput.focus();
    }

    function closeFollow() {
      pendingFollowTeam = null;
      modalBackdrop.classList.remove('visible');
    }

    async function saveFollow(league, teamName, email, preferences = defaultPreferences()) {
      setCurrentEmail(email);
      upsertLocalFollow({
        email,
        league: league.id,
        leagueName: league.name,
        team: teamName,
        preferences
      });
      saveSubscriptions();

      if (['mlb', 'nfl', 'nba', 'nhl', 'mls', 'wnba'].includes(league.id)) {
        showToast('Saving automatic email follow...');
        try {
          const followResponse = await fetch('/api/follow-team', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email,
              league: league.id,
              leagueName: league.name,
              team: teamName,
              preferences
            })
          });
          const data = await followResponse.json();

          if (!followResponse.ok) {
            throw new Error(data.error || 'Follow save failed');
          }
          trackEvent('follow_saved', {
            league: league.id,
            team: teamName
          });
          showToast(`${teamName} automatic final-score emails saved for ${email}.`);
        } catch (error) {
          showToast(`Local follow saved, but server follow failed: ${error.message}`);
        }
      } else {
        showToast(`${teamName} local alerts saved for ${email}.`);
      }

      renderDetail(league, teamName);
    }

    async function testEmail(league, teamName) {
      const subscription = subscriptionFor(league, teamName);
      if (!subscription) {
        openFollow(league, teamName);
        showToast('Add an email first, then send a test alert.');
        return;
      }

      if (!normalizePreferences(subscription.preferences).testEmails) {
        showToast('Test emails are turned off for this follow. Update Email to turn them back on.');
        return;
      }

      const stats = buildStats(league, teamName);
      showToast('Sending test email...');

      try {
        const emailResponse = await fetch('/api/send-test-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: subscription.email,
            team: teamName,
            nextGame: stats.nextGame,
            nextGameTime: stats.nextGameTime,
            record: stats.record,
            source: stats.source
          })
        });
        const data = await emailResponse.json();

        if (!emailResponse.ok) {
          throw new Error(data.error || data.message || 'Email failed');
        }

        showToast(`Test email sent to ${subscription.email}.`);
        trackEvent('test_email_sent', {
          league: league.id,
          team: teamName
        });
      } catch (error) {
        showToast(`Email failed: ${error.message}`);
      }
    }

    async function loadServerFollows(email) {
      if (!email) {
        return [];
      }

      const response = await fetch(`/api/list-follows?email=${encodeURIComponent(email)}`);
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || 'Could not load follows');
      }

      return (data.follows || []).map((follow) => ({
        email: follow.email,
        league: follow.league,
        leagueName: follow.league_name || follow.league,
        team: follow.team,
        preferences: normalizePreferences(follow),
        createdAt: follow.created_at
      }));
    }

    async function renderMyTeams() {
      view = 'my-teams';
      activeLeague = null;
      activeTeam = null;
      setHeader('Saved follows', 'My Teams', currentEmail ? `Showing follows saved for ${currentEmail}.` : 'Follow a team or enter your email to load saved follows.');
      content.innerHTML = '';

      const panel = document.createElement('section');
      panel.className = 'stats-panel';
      panel.innerHTML = `
        <div class="matchup">
          <h3>Saved Email</h3>
          <p class="sub">Use the same email you entered when following teams.</p>
          <div class="follow-actions">
            <input class="search" id="myTeamsEmail" type="email" placeholder="your@email.com" value="${currentEmail}">
            <button class="primary-button" id="loadMyTeams" type="button">Load</button>
          </div>
        </div>
        <div class="follow-list" id="myTeamsList"></div>
      `;
      content.append(panel);

      document.getElementById('loadMyTeams').addEventListener('click', () => {
        const email = document.getElementById('myTeamsEmail').value.trim();
        if (!email) {
          showToast('Enter an email to load follows.');
          return;
        }
        setCurrentEmail(email);
        renderMyTeams();
      });

      const list = document.getElementById('myTeamsList');
      list.innerHTML = '<div class="follow-item"><strong>Loading follows</strong><span>Checking saved server data...</span></div>';

      try {
        const serverFollows = currentEmail ? await loadServerFollows(currentEmail) : [];
        serverFollows.forEach((follow) => upsertLocalFollow(follow));
        if (serverFollows.length) {
          saveSubscriptions();
        }
      } catch (error) {
        showToast(`Could not load server follows: ${error.message}`);
      }

      const follows = subscriptions.filter((item) => !currentEmail || item.email === currentEmail);
      list.innerHTML = '';

      if (!follows.length) {
        list.innerHTML = '<div class="follow-item"><strong>No follows found</strong><span>Open a team and click Follow to save one.</span></div>';
        return;
      }

      follows
        .slice()
        .sort((a, b) => a.team.localeCompare(b.team))
        .forEach((follow) => {
          const league = leagues.find((item) => item.id === follow.league);
          const preferences = normalizePreferences(follow.preferences);
          const item = document.createElement('div');
          item.className = 'follow-item';
          item.innerHTML = `
            <strong>${follow.team}</strong>
            <span>${follow.leagueName || league?.name || follow.league} | ${follow.email}</span>
            <label class="preference-row"><input class="pref-final" type="checkbox" ${preferences.finalScore ? 'checked' : ''}> Final score emails</label>
            <label class="preference-row"><input class="pref-reminder" type="checkbox" ${preferences.reminders ? 'checked' : ''}> Reminder emails</label>
            <label class="preference-row"><input class="pref-test" type="checkbox" ${preferences.testEmails ? 'checked' : ''}> Test emails</label>
            <div class="follow-actions">
              <button class="plain-button open-team" type="button">Open</button>
              <button class="plain-button remove-team" type="button">Unfollow</button>
            </div>
          `;
          item.querySelector('.open-team').addEventListener('click', () => {
            if (league) {
              renderDetail(league, follow.team);
            }
          });
          item.querySelector('.remove-team').addEventListener('click', () => unfollowTeam(league, follow.team, follow.email, true));
          const collectItemPreferences = () => ({
            finalScore: item.querySelector('.pref-final').checked,
            reminders: item.querySelector('.pref-reminder').checked,
            testEmails: item.querySelector('.pref-test').checked
          });
          item.querySelector('.pref-final').addEventListener('change', () => {
            updatePreferences(league, follow.team, follow.email, collectItemPreferences());
          });
          item.querySelector('.pref-reminder').addEventListener('change', () => {
            updatePreferences(league, follow.team, follow.email, collectItemPreferences());
          });
          item.querySelector('.pref-test').addEventListener('change', () => {
            updatePreferences(league, follow.team, follow.email, collectItemPreferences());
          });
          list.append(item);
        });
    }

    async function updatePreferences(league, teamName, email, preferences) {
      if (!league || !email) {
        return;
      }

      const follow = upsertLocalFollow({
        email,
        league: league.id,
        leagueName: league.name,
        team: teamName,
        preferences
      });
      follow.preferences = normalizePreferences(preferences);
      saveSubscriptions();

      try {
        const response = await fetch('/api/update-preferences', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email,
            league: league.id,
            team: teamName,
            preferences: follow.preferences
          })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Preference update failed');
        }
        showToast(`${teamName} preferences saved.`);
      } catch (error) {
        showToast(`Local preferences saved, but server update failed: ${error.message}`);
      }
    }

    async function unfollowTeam(league, teamName, email = currentEmail, stayOnMyTeams = false) {
      if (!league) {
        showToast('This saved follow is missing its league.');
        return;
      }

      const subscription = subscriptionFor(league, teamName);
      const followEmail = email || subscription?.email;
      if (!followEmail) {
        showToast('No saved follow was found for this team.');
        return;
      }

      removeLocalFollow(followEmail, league.id, teamName);
      showToast(`Removed ${teamName} locally.`);

      try {
        const response = await fetch('/api/unfollow-team', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: followEmail,
            league: league.id,
            team: teamName
          })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Unfollow failed');
        }
        showToast(`${teamName} unfollowed.`);
      } catch (error) {
        showToast(`Local unfollow saved, but server failed: ${error.message}`);
      }

      if (stayOnMyTeams || view === 'my-teams') {
        renderMyTeams();
      } else {
        renderDetail(league, teamName, false);
      }
    }

    function renderSearchResults(query) {
      view = 'search';
      activeLeague = null;
      activeTeam = null;
      const matches = allTeamEntries().filter(({ league, team }) => (
        team.toLowerCase().includes(query)
        || league.name.toLowerCase().includes(query)
        || league.fullName.toLowerCase().includes(query)
      ));
      setHeader('Search', 'Team Search', query ? `${matches.length} matches for "${query}".` : 'Start typing to search every league.');
      content.innerHTML = '';

      if (!query) {
        renderLeagues();
        return;
      }

      const grid = document.createElement('section');
      grid.className = 'grid';
      matches.forEach(({ league, team }) => {
        const stats = buildStats(league, team);
        const colors = teamColors(team);
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.addEventListener('click', () => {
          globalSearch.value = '';
          renderDetail(league, team);
        });
        card.innerHTML = `
          <div>
            <span class="emoji" style="color:${colors[0]}">${teamInitials(team)}</span>
            <span class="card-title">${team}</span>
            <span class="card-copy">${league.name} | ${stats.record} season | ${stats.nextGame}</span>
          </div>
          <div class="chips">
            <span class="chip" style="--chip-color:${league.color}">${league.sport}</span>
            <span class="chip" style="--chip-color:${colors[1]}">${isFollowing(league, team) ? 'following' : 'open'}</span>
          </div>
        `;
        grid.append(card);
      });

      if (!matches.length) {
        content.innerHTML = '<p class="sub">No teams matched that search.</p>';
        return;
      }

      content.append(grid);
    }

    async function runRecapsNow() {
      const secret = await promptSecret('Run Recaps Now');
      if (!secret) {
        return;
      }

      trackEvent('recap_run_clicked');
      showToast('Running recap checker...');
      try {
        const response = await fetch(`/api/run-recaps-now?secret=${encodeURIComponent(secret)}`);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Recap run failed');
        }
        showToast(`Recap run complete: ${data.sent || 0} sent, ${data.skipped || 0} skipped, ${data.errors || 0} errors.`);
      } catch (error) {
        showToast(`Recap run failed: ${error.message}`);
      }
    }

    async function showAnalytics() {
      const secret = await promptSecret('View Analytics');
      if (!secret) {
        return;
      }

      view = 'analytics';
      setHeader('Private report', 'Analytics', 'Loading app analytics. Your current browser and saved email are excluded from the report.');
      content.innerHTML = '<div class="card loading-card"><span class="card-title">Loading analytics</span><span class="card-copy">Checking visits, follows, teams, and email activity.</span></div>';

      try {
        const params = new URLSearchParams({
          secret,
          excludeVisitorId: visitorId,
          excludeEmail: currentEmail
        });
        const response = await fetch(`/api/analytics-report?${params.toString()}`);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Analytics report failed');
        }
        localStorage.setItem('sports-central-owner-mode', 'true');

        const metricCards = [
          ['Page Views', data.totals.pageViews],
          ['Unique Visitors', data.totals.uniqueVisitors],
          ['Sessions', data.totals.sessions],
          ['Events Today', data.totals.eventsToday],
          ['Events Last 7 Days', data.totals.eventsLast7Days],
          ['Saved Follows', data.totals.follows],
          ['Followed Emails', data.totals.followedEmails],
          ['Final Emails Sent', data.totals.finalScoreEmailsSent]
        ];

        const listMarkup = (title, rows) => `
          <div class="matchup analytics-section">
            <h3>${title}</h3>
            <div class="analytics-list">
              ${(rows || []).length
                ? rows.map((row) => `<div class="analytics-row"><span>${row.name}</span><strong>${row.count}</strong></div>`).join('')
                : '<p class="sub">No data yet.</p>'}
            </div>
          </div>
        `;

        content.innerHTML = `
          <section class="stats-panel analytics-layout">
            <div class="matchup">
              <h3>Overview</h3>
              <p class="sub">This report excludes this browser and ${currentEmail || 'your saved email once you enter one'}.</p>
              <p class="sub">Generated ${new Date(data.generatedAt).toLocaleString()}</p>
            </div>
            <div class="stat-grid">
              ${metricCards.map(([label, value]) => `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`).join('')}
            </div>
            ${listMarkup('Top Pages', data.topPages)}
            <div class="grid">
              ${listMarkup('Top Leagues', data.topLeagues)}
              ${listMarkup('Top Teams', data.topTeams)}
              ${listMarkup('Event Types', data.eventTypes)}
            </div>
            <div class="matchup analytics-section">
              <h3>Recent Events</h3>
              <div class="analytics-list">
                ${(data.recentEvents || []).length
                  ? data.recentEvents.map((event) => `<div class="analytics-row"><span>${event.eventType}${event.league ? ` | ${event.league}` : ''}${event.team ? ` | ${event.team}` : ''}</span><strong>${new Date(event.createdAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}</strong></div>`).join('')
                  : '<p class="sub">No recent events yet.</p>'}
              </div>
            </div>
          </section>
        `;
        setHeader('Private report', 'Analytics', `Generated ${new Date(data.generatedAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}. Your own visits are excluded.`);
      } catch (error) {
        content.innerHTML = `<p class="sub">Analytics failed: ${error.message}</p>`;
        showToast(`Analytics failed: ${error.message}`);
      }
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('visible');
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    backButton.addEventListener('click', () => {
      if (view === 'detail') {
        renderTeams(activeLeague);
      } else if (view === 'my-teams' || view === 'search') {
        globalSearch.value = '';
        renderLeagues();
      } else {
        renderLeagues();
      }
    });

    search.addEventListener('input', () => {
      if (activeLeague) {
        renderTeams(activeLeague);
      }
    });

    globalSearch.addEventListener('input', () => {
      const query = globalSearch.value.trim().toLowerCase();
      if (query) {
        renderSearchResults(query);
      } else if (view === 'search') {
        renderLeagues();
      }
    });

    myTeamsButton.addEventListener('click', renderMyTeams);
    analyticsButton.addEventListener('click', showAnalytics);
    runRecapsButton.addEventListener('click', runRecapsNow);

    followForm.addEventListener('submit', (event) => {
      event.preventDefault();
      if (pendingFollowTeam) {
        saveFollow(pendingFollowTeam.league, pendingFollowTeam.teamName, emailInput.value.trim(), {
          finalScore: prefFinal.checked,
          reminders: prefReminder.checked,
          testEmails: prefTest.checked
        });
      }
      closeFollow();
    });

    cancelFollow.addEventListener('click', closeFollow);

    modalBackdrop.addEventListener('click', (event) => {
      if (event.target === modalBackdrop) {
        closeFollow();
      }
    });

    startLiveRefresh();
    trackEvent('page_view');
    renderLeagues();
  </script>
</body>
</html>
